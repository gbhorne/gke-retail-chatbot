<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Retail Shopping Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#f7f7f5;--surface:#fff;--border:#e5e5e3;--text:#1a1a1a;--muted:#7a7a7a;--accent:#2563eb;--accent-hover:#1d4ed8;--user-bg:#2563eb;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
    header{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);z-index:10}
    .logo{width:40px;height:40px;background:var(--accent);border-radius:10px;display:grid;place-items:center;font-size:20px}
    .htxt h1{font-size:17px;font-weight:700}.htxt p{font-size:12px;color:var(--muted);font-weight:500}
    .tags{margin-left:auto;display:flex;gap:8px}
    .tag{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:6px;letter-spacing:.04em}
    .tg{background:#ecfdf5;color:#059669}.tl{background:#eff4ff;color:var(--accent)}
    #chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
    #chat::-webkit-scrollbar{width:5px}#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
    .msg{max-width:680px;padding:14px 18px;border-radius:var(--radius);font-size:14px;line-height:1.65;white-space:pre-wrap;animation:fu .3s ease both}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{align-self:flex-end;background:var(--user-bg);color:#fff;border-bottom-right-radius:4px}
    .msg.bot{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
    .dots{display:inline-flex;gap:4px;padding:6px 0}.dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:d 1.4s ease-in-out infinite}
    .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
    @keyframes d{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}
    .chips{display:flex;flex-wrap:wrap;gap:8px;align-self:flex-start;animation:fu .3s ease .1s both}
    .chip{padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
    .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px)}
    #bar{padding:16px 24px 20px;background:var(--surface);border-top:1px solid var(--border);z-index:10}
    .irow{display:flex;gap:8px;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:5px 5px 5px 16px;transition:border-color .2s,box-shadow .2s}
    .irow:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    .irow input{flex:1;border:none;outline:none;font-size:14px;font-family:inherit;background:transparent;color:var(--text)}
    .irow input::placeholder{color:var(--muted)}
    .snd{width:38px;height:38px;border-radius:9px;border:none;background:var(--accent);color:#fff;cursor:pointer;display:grid;place-items:center;transition:background .15s;flex-shrink:0}
    .snd:hover{background:var(--accent-hover)}.snd:disabled{opacity:.35;cursor:default}
    .snd svg{width:16px;height:16px}
    @media(max-width:600px){#chat{padding:16px 12px}.msg{max-width:100%}}
  </style>
</head>
<body>
  <header>
    <div class="logo"></div>
    <div class="htxt"><h1>Retail Assistant</h1><p>Search  Compare  Deals  Stock</p></div>
    <div class="tags"><span class="tag tg">GKE</span><span class="tag tl">Live</span></div>
  </header>
  <div id="chat"></div>
  <div id="bar">
    <div class="irow">
      <input id="inp" type="text" placeholder="Search products, ask for deals, compare items ..." autofocus/>
      <button class="snd" id="btn" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
  <script>
    var ch=document.getElementById("chat"),inp=document.getElementById("inp"),btn=document.getElementById("btn");
    var sid=null;
    inp.addEventListener("keydown",function(e){if(e.key==="Enter")send()});
    window.addEventListener("DOMContentLoaded",function(){
      addBot("Hey! I can help you find products, compare options, spot deals, and check stock across electronics, clothing, home, sports, beauty, and grocery. What are you looking for?");
      addChips(["Show me electronics under $100","What's on sale?","Best rated sports gear","Compare headphones","Browse all categories"]);
    });
    function send(ov){
      var t=(ov||inp.value).trim();if(!t)return;
      addUser(t);inp.value="";btn.disabled=true;
      var chips=document.querySelectorAll(".chips");for(var i=0;i<chips.length;i++)chips[i].remove();
      var ty=addTyping();
      fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:t,session_id:sid})})
        .then(function(r){return r.json()})
        .then(function(d){sid=d.session_id;ty.remove();addBot(d.reply||d.error)})
        .catch(function(){ty.remove();addBot("Connection error. Please try again.")})
        .finally(function(){btn.disabled=false;inp.focus()});
    }
    function addUser(t){return addMsg(t,"user")}
    function addBot(t){var e=addMsg(t,"bot");e.innerHTML=e.innerHTML.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");return e}
    function addMsg(t,c){var e=document.createElement("div");e.className="msg "+c;e.textContent=t;ch.appendChild(e);ch.scrollTop=ch.scrollHeight;return e}
    function addTyping(){var e=document.createElement("div");e.className="msg bot";e.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';ch.appendChild(e);ch.scrollTop=ch.scrollHeight;return e}
    function addChips(ls){var w=document.createElement("div");w.className="chips";for(var i=0;i<ls.length;i++){var c=document.createElement("button");c.className="chip";c.textContent=ls[i];c.onclick=(function(l){return function(){send(l)}})(ls[i]);w.appendChild(c)}ch.appendChild(w);ch.scrollTop=ch.scrollHeight}
  </script>
</body>
</html>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-chatbot
  labels:
    app: retail-chatbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retail-chatbot
  template:
    metadata:
      labels:
        app: retail-chatbot
    spec:
      serviceAccountName: retail-chatbot-ksa
      containers:
        - name: chatbot
          image: us-central1-docker.pkg.dev/gke-retail-chatbot/chatbot-repo/retail-chatbot:v1
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: retail-chatbot-config
                  key: project-id
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-chatbot-secrets
                  key: google-api-key
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: retail-chatbot
